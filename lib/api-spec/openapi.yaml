          type: string
      required: [userId, email]

    LastMemberPrefsDigestSummary:
      type: object
      description: |
        Summary of the most recent monthly member-prefs digest send for an
        org, parsed from the `member_audit_log` row written by the cron.
      properties:
        sentAt:
          type: string
          format: date-time
          description: When the digest was sent (ISO timestamp).
        period:
          type: string
          nullable: true
          description: Calendar month covered, formatted as `YYYY-MM` (UTC).
        memberRows:
          type: integer
          description: Number of member rows in the attached CSV snapshot.
        recipientsEmailed:
          type: integer
          description: Count of controllers who successfully received the email.
        recipientsSuppressed:
          type: integer
          description: Count of eligible controllers skipped due to per-user opt-out.
        filename:
          type: string
          nullable: true
          description: Filename of the CSV attachment that was emailed.
        recipients:
          type: array
          items:
            $ref: "#/components/schemas/MemberPrefsDigestRecipient"
          description: Per-recipient list (userId + email) that successfully received the digest.
      required:
        - sentAt
        - memberRows
        - recipientsEmailed
        - recipientsSuppressed
        - recipients

    LastMemberPrefsDigestResponse:
      type: object
      properties:
        lastDigest:
          allOf:
            - $ref: "#/components/schemas/LastMemberPrefsDigestSummary"
          nullable: true
          description: Null when no digest has been sent yet for this organization.
      required: [lastDigest]

