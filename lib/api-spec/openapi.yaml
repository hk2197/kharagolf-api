          type: string
        displayName:
          type: string
        profileImage:
          type: string
          nullable: true
        role:
          type: string
          enum: [super_admin, org_admin, tournament_director, committee_member, competition_secretary, volunteer, player, spectator, pro_shop]
        organizationId:
          type: integer
          nullable: true
        organizationName:
          type: string
          nullable: true
        preferredLanguage:
          type: string
          nullable: true
        memberAdminOrgIds:
          type: array
          description: >
            Org ids in which this user has a membership-derived
            member-admin role (org_admin / membership_secretary /
            treasurer in `org_memberships`). Pre-computed by the server
            so clients can gate member-360 controller surfaces (stuck
            erasure, privacy requests, etc.) for treasurers and
            membership secretaries without issuing a follow-up
            "what are my memberships?" request. The shared
            `@workspace/member-admin-roles` helper consumes this field
            on both web and mobile.
          items:
            type: integer
        createdAt:
          type: string
      required: [id, replitId, username, role, createdAt]

