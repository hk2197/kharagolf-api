          type: boolean
        preferWhatsapp:
          type: boolean
        notifySideGameReceipts:
          type: boolean
        reason:
          type: string
          description: Optional free-text reason recorded in the audit trail.

    MemberAuditLogFieldChange:
      type: object
      description: Before/after values for a single field that was edited.
      properties:
        from:
          nullable: true
          description: Previous value (any JSON-serialisable shape; may be null).
        to:
          nullable: true
          description: New value (any JSON-serialisable shape; may be null).

    MemberAuditLogEntry:
      type: object
      description: A single row from `member_audit_log` rendered for the admin Players timeline. Returned in reverse-chronological order (newest first).
      properties:
        id:
          type: integer
        createdAt:
          type: string
          format: date-time
        actorUserId:
          type: integer
          nullable: true
        actorName:
          type: string
          nullable: true
          description: Display name of the admin who performed the action (falls back to email or "system").
        actorRole:
          type: string
          nullable: true
        entity:
          type: string
        entityId:
          type: integer
          nullable: true
        action:
          type: string
          description: e.g. `create`, `update`, `delete`, `view_pii`.
        fieldChanges:
          type: object
          nullable: true
          additionalProperties:
            $ref: "#/components/schemas/MemberAuditLogFieldChange"
          description: Map of field name to before/after values. Empty/null when the action was not a field-level edit.
        reason:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true
      required: [id, createdAt, entity, action]

    MemberAuditLogActor:
      type: object
      description: A distinct actor (admin) that has appeared in this member's audit history. Used to populate the actor filter dropdown.
      properties:
        actorUserId:
          type: integer
        actorName:
          type: string
          nullable: true
      required: [actorUserId]

    MemberAuditLogAppliedFilters:
      type: object
      description: Echoes the filter values that were applied to this response (after parsing/validation).
      properties:
        from:
          type: string
          format: date-time
          nullable: true
        to:
          type: string
          format: date-time
          nullable: true
        actorUserId:
          type: integer
          nullable: true
      required: [from, to, actorUserId]

    MemberAuditLogResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/MemberAuditLogEntry"
        limit:
          type: integer
          description: The cap that was applied to this response.
        availableActors:
          type: array
          description: Distinct actors that have ever written an audit row for this member (within the same `entity` scope). Stable across filter changes so the actor dropdown stays populated.
          items:
            $ref: "#/components/schemas/MemberAuditLogActor"
        appliedFilters:
          $ref: "#/components/schemas/MemberAuditLogAppliedFilters"
      required: [entries, limit, availableActors, appliedFilters]

    MemberPrefsDigestRecipient:
