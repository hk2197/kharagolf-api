openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: KHARAGOLF Enterprise - Golf Tournament SaaS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: organizations
    description: Organization/club management
  - name: users
    description: User management
  - name: tournaments
    description: Tournament management
  - name: courses
    description: Golf course management
  - name: players
    description: Player management and registration
  - name: scores
    description: Score entry and management
  - name: leaderboard
    description: Real-time leaderboard
  - name: tee-times
    description: Tee time and pairing management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ORGANIZATIONS
  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      summary: List organizations (super admin sees all, others see their own)
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Create a new organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationInput"
      responses:
        "201":
          description: Created organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{orgId}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get organization details
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    put:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationInput"
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{orgId}/stats:
    get:
      operationId: getOrganizationStats
      tags: [organizations]
      summary: Get org stats (tournaments, players, revenue)
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organization statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgStats"

  # USERS
  /organizations/{orgId}/members:
    get:
      operationId: listOrgMembers
      tags: [users]
      summary: List members of an organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgMember"
    post:
      operationId: addOrgMember
      tags: [users]
      summary: Add member to organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberInput"
      responses:
        "201":
          description: Added member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMember"

  /organizations/{orgId}/members/{userId}:
    put:
      operationId: updateMemberRole
      tags: [users]
      summary: Update member role
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleInput"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMember"
    delete:
      operationId: removeOrgMember
      tags: [users]
      summary: Remove member from organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /organizations/{orgId}/members/notification-prefs/last-digest:
    get:
      operationId: getLastMemberPrefsDigest
      tags: [users]
      summary: Latest monthly member-prefs digest send (recipient list + counts).
      description: |
        Returns the most recent `member_audit_log` row written by the
        monthly `sendMemberPrefsDigest` cron (entity=`comm_prefs`,
        action=`member_prefs_digest_sent`) for this org. Used by the
        admin notification-prefs panel to confirm who received the last
        digest without querying the audit log directly. Returns
        `{ lastDigest: null }` when nothing has been sent yet.
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Last digest send (or null when none exists yet).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LastMemberPrefsDigestResponse"

  /organizations/{orgId}/members/{userId}/notification-prefs:
    put:
      operationId: updateMemberNotifPrefs
      tags: [users]
      summary: Admin toggle of a member's notification preferences (currently side-game receipts)
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberNotifPrefsInput"
      responses:
        "200":
          description: Updated notification preferences for the member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMemberNotifPrefs"

  /organizations/{orgId}/members/audit-log.csv:
    get:
      operationId: exportOrgCommPrefsAuditCsv
      tags: [users]
      summary: Org-wide CSV export of the comm_prefs audit history.
      description: |
        Compliance/treasury staff often need to download every notification
        preference change recorded in the org for offline review. Returns the
        same `member_audit_log` rows as the in-page Players timeline (Task
        #1505) — one CSV row per (audit row × field) so multi-field saves
        expand naturally — with columns: Timestamp, Member User ID, Member,
        Actor, Role, Entity, Action, Field, Before, After, Reason.
        Defaults to entity=`comm_prefs`; pass `?entity=all` to include every
        entity recorded against members in the org.
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: entity
          in: query
          required: false
          description: Audit `entity` slug to filter by. Defaults to `comm_prefs`. Pass `all` to include every entity.
          schema:
            type: string
            default: comm_prefs
      responses:
        "200":
          description: CSV file (text/csv).
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /organizations/{orgId}/members/{userId}/audit-log.csv:
    get:
      operationId: exportMemberCommPrefsAuditCsv
      tags: [users]
      summary: Per-member CSV export of the comm_prefs audit history.
      description: |
        Same column set as `/organizations/{orgId}/members/audit-log.csv` but
        scoped to a single member's audit rows (entityId match). Backs the
        per-member "Download history" button rendered alongside the
        in-page timeline (Task #1505).
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: entity
          in: query
          required: false
          description: Audit `entity` slug to filter by. Defaults to `comm_prefs`. Pass `all` to include every entity.
          schema:
            type: string
            default: comm_prefs
      responses:
        "200":
          description: CSV file (text/csv).
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "404":
          description: The user is not a member of this organization.

  /organizations/{orgId}/members/{userId}/audit-log:
    get:
      operationId: getMemberAuditLog
      tags: [users]
      summary: Chronological audit log for a member (defaults to comm_prefs entries).
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: entity
          in: query
          required: false
          description: Audit `entity` slug to filter by (e.g. `comm_prefs`). Pass `all` to return every entity. Defaults to `comm_prefs`.
          schema:
            type: string
            default: comm_prefs
        - name: limit
          in: query
          required: false
          description: Max number of rows to return (1-100). Defaults to 20.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: from
          in: query
          required: false
          description: Inclusive ISO timestamp lower bound on `createdAt`. Entries strictly before this are excluded.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Inclusive ISO timestamp upper bound on `createdAt`. Entries strictly after this are excluded.
          schema:
            type: string
            format: date-time
        - name: actorUserId
          in: query
          required: false
          description: Restrict results to entries written by the given actor (`app_users.id`).
          schema:
            type: integer
      responses:
        "200":
          description: Reverse-chronological list of audit-log entries for the member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberAuditLogResponse"

  # COURSES
  /organizations/{orgId}/courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List golf courses for an organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a new course
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseInput"
      responses:
        "201":
          description: Created course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /organizations/{orgId}/courses/{courseId}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get course with hole details
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course with holes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseWithHoles"
    put:
      operationId: updateCourse
      tags: [courses]
      summary: Update course
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseInput"
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseWithHoles"

  # TOURNAMENTS
  /organizations/{orgId}/tournaments:
    get:
      operationId: listTournaments
      tags: [tournaments]
      summary: List tournaments for an organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, active, completed, cancelled]
      responses:
        "200":
          description: List of tournaments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tournament"
    post:
      operationId: createTournament
      tags: [tournaments]
      summary: Create a new tournament
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTournamentInput"
      responses:
        "201":
          description: Created tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"

  /organizations/{orgId}/tournaments/{tournamentId}:
    get:
      operationId: getTournament
      tags: [tournaments]
      summary: Get tournament details
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentDetail"
    put:
      operationId: updateTournament
      tags: [tournaments]
      summary: Update tournament
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTournamentInput"
      responses:
        "200":
          description: Updated tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"
    delete:
      operationId: deleteTournament
      tags: [tournaments]
      summary: Delete tournament
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /organizations/{orgId}/tournaments/{tournamentId}/publish:
    post:
      operationId: publishTournament
      tags: [tournaments]
      summary: Publish/activate a tournament
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"

  # PLAYERS / REGISTRATIONS
  /organizations/{orgId}/tournaments/{tournamentId}/players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List registered players in a tournament
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: registerPlayer
      tags: [players]
      summary: Register a player for a tournament
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPlayerInput"
      responses:
        "201":
          description: Registered player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /organizations/{orgId}/tournaments/{tournamentId}/players/{playerId}:
    put:
      operationId: updatePlayer
      tags: [players]
      summary: Update player registration
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPlayerInput"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: removePlayer
      tags: [players]
      summary: Remove player from tournament
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /organizations/{orgId}/tournaments/{tournamentId}/players/{playerId}/checkin:
    post:
      operationId: checkInPlayer
      tags: [players]
      summary: QR check-in player
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  # TEE TIMES
  /organizations/{orgId}/tournaments/{tournamentId}/tee-times:
    get:
      operationId: listTeeTimes
      tags: [tee-times]
      summary: List tee times and pairings
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tee times
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeeTime"
    post:
      operationId: createTeeTime
      tags: [tee-times]
      summary: Create tee time
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeeTimeInput"
      responses:
        "201":
          description: Created tee time
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeeTime"

  /organizations/{orgId}/tournaments/{tournamentId}/generate-pairings:
    post:
      operationId: generatePairings
      tags: [tee-times]
      summary: Auto-generate pairings and tee times
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePairingsInput"
      responses:
        "200":
          description: Generated tee times
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeeTime"

  # SCORES
  /organizations/{orgId}/tournaments/{tournamentId}/scores:
    get:
      operationId: listScores
      tags: [scores]
      summary: List all scores for a tournament
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Score"
    post:
      operationId: submitScore
      tags: [scores]
      summary: Submit or update a hole score
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitScoreInput"
      responses:
        "200":
          description: Submitted score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Score"

  /organizations/{orgId}/tournaments/{tournamentId}/scores/bulk:
    post:
      operationId: bulkSubmitScores
      tags: [scores]
      summary: Submit multiple hole scores at once
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkSubmitScoresInput"
      responses:
        "200":
          description: Submitted scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Score"

  # LEADERBOARD
  /organizations/{orgId}/tournaments/{tournamentId}/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get tournament leaderboard
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: flight
          in: query
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [gross, net, skins, match_play]
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaderboard"

  /organizations/{orgId}/tournaments/{tournamentId}/scorecard/{playerId}:
    get:
      operationId: getScorecard
      tags: [scores]
      summary: Get full scorecard for a player
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scorecard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scorecard"

  # SUPER ADMIN
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [organizations]
      summary: Super admin global stats
      responses:
        "200":
          description: Global stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    AuthUser:
      type: object
      properties:
        id:
          type: integer
